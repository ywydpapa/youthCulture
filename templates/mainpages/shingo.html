<!DOCTYPE html>

    <div class="d-flex justify-content-center align-items-center my-5" style="min-height: 30vh;">

        <div class="row align-items-center w-100" style="max-width: 900px;">

            <!-- 왼쪽 이미지 영역 -->
            <div class="col-md-6 text-center text-md-end mb-4 mb-md-0">

                    <a href="https://www.epeople.go.kr/" target="_blank"

                <!-- 국세청 부분 -->
                <div>
                    <h3 class="fw-bold" style="color: #2b669a;">국세청 바로가기</h3>

                       class="text-dark text-decoration-underline fs-5">
                        https://www.nts.go.kr/nts/main.do

                </div>

        </div>

</div>
